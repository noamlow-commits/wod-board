<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Profile - CrossFit Gush Etzion</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --card-bg: #141414;
      --card-border: #2a2a2a;
      --text: #f0f0f0;
      --text-dim: #888;
      --accent: #ef4444;
      --accent2: #f59e0b;
      --success: #22c55e;
      --blue: #3b82f6;
      --purple: #a855f7;
      --gold: #f59e0b;
    }

    body {
      font-family: 'Heebo', 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    /* ── Header ── */
    .app-header {
      background: linear-gradient(135deg, #111, #1a1a1a);
      border-bottom: 1px solid #222;
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-header .logo {
      font-family: 'Barlow', sans-serif;
      font-size: 1.2rem;
      font-weight: 900;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-links {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    .header-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.3rem 0.6rem;
      border: 1px solid #333;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .header-links a:hover { color: var(--text); border-color: #555; }

    /* ── Welcome Banner ── */
    .welcome-banner {
      padding: 1.8rem 1rem 1.2rem;
      text-align: center;
      background: linear-gradient(180deg, rgba(239,68,68,0.12) 0%, rgba(245,158,11,0.06) 50%, transparent 100%);
      border-bottom: 1px solid #222;
      position: relative;
      overflow: hidden;
    }

    .welcome-banner::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 0%, rgba(239,68,68,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ── Avatar Ring ── */
    .avatar-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 0.6rem;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      padding: 3px;
      background: conic-gradient(var(--accent), var(--gold), var(--accent));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: ringPulse 3s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.8; transform: rotate(0deg); }
      50% { opacity: 1; transform: rotate(180deg); }
    }

    .avatar-inner {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .welcome-banner .athlete-name {
      font-size: 1.6rem;
      font-weight: 900;
      margin-bottom: 0.1rem;
    }

    .welcome-banner .athlete-title {
      font-size: 0.8rem;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 0.6rem;
      letter-spacing: 0.5px;
    }

    .welcome-banner .stats-row {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 0.6rem;
    }

    .welcome-banner .stat-item {
      text-align: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 0.5rem 0.8rem;
      min-width: 75px;
      backdrop-filter: blur(10px);
      transition: transform 0.2s;
    }

    .welcome-banner .stat-item:active {
      transform: scale(0.95);
    }

    .welcome-banner .stat-num {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1.2;
    }

    .welcome-banner .stat-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      line-height: 1.3;
    }

    /* ── Name Entry ── */
    .name-entry {
      padding: 2rem 1rem;
      text-align: center;
      max-width: 380px;
      margin: 3rem auto;
    }

    .name-entry h2 {
      font-size: 1.3rem;
      margin-bottom: 1rem;
    }

    .name-entry input {
      width: 100%;
      padding: 0.8rem;
      font-size: 1.1rem;
      border-radius: 10px;
      border: 1px solid #333;
      background: var(--card-bg);
      color: var(--text);
      text-align: center;
      direction: rtl;
      font-family: inherit;
    }

    .name-entry button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.8rem;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      cursor: pointer;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid #222;
      background: #111;
      position: sticky;
      top: 52px;
      z-index: 99;
    }

    .tab-btn {
      flex: 1;
      padding: 0.7rem 0.5rem;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      font-family: inherit;
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-panel { display: none; padding: 1rem; }
    .tab-panel.active { display: block; }

    /* ── Cards ── */
    .card {
      background: linear-gradient(135deg, rgba(20,20,20,0.9), rgba(25,25,25,0.8));
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 0.8rem;
      backdrop-filter: blur(10px);
      transition: transform 0.2s, border-color 0.2s;
    }

    .card:hover {
      border-color: #3a3a3a;
    }

    .card-title {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    /* ── PR List ── */
    .pr-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid #1e1e1e;
    }

    .pr-item:last-child { border-bottom: none; }

    .pr-exercise {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .pr-value {
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--gold);
    }

    .pr-date {
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    /* ── Progress Chart (CSS-only bar chart) ── */
    .chart-container { margin-top: 0.5rem; }

    .chart-bar-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }

    .chart-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      min-width: 50px;
      text-align: left;
      direction: ltr;
    }

    .chart-bar-wrap {
      flex: 1;
      height: 22px;
      background: #1e1e1e;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .chart-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-left: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #fff;
      min-width: 30px;
    }

    .chart-bar.pr-bar {
      background: linear-gradient(90deg, var(--gold), #d97706);
      box-shadow: 0 0 8px rgba(245,158,11,0.3);
    }
    .chart-bar.normal-bar { background: linear-gradient(90deg, var(--blue), #1d4ed8); }

    /* ── Leaderboard ── */
    .lb-exercise-title {
      font-size: 1rem;
      font-weight: 900;
      margin: 1rem 0 0.5rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid #2a2a2a;
    }

    .lb-row {
      display: flex;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .lb-rank {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 0.8rem;
      margin-left: 0.6rem;
      flex-shrink: 0;
    }

    .lb-rank.gold { background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; }
    .lb-rank.silver { background: linear-gradient(135deg, #94a3b8, #64748b); color: #000; }
    .lb-rank.bronze { background: linear-gradient(135deg, #b45309, #92400e); color: #fff; }
    .lb-rank.other { background: #222; color: var(--text-dim); }

    .lb-name {
      flex: 1;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .lb-name.is-me { color: var(--accent); }

    .lb-score {
      font-weight: 900;
      font-size: 1rem;
      direction: ltr;
    }

    /* ── Exercise Filter ── */
    .exercise-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .filter-chip {
      padding: 0.35rem 0.7rem;
      border-radius: 20px;
      border: 1px solid #333;
      background: none;
      color: var(--text-dim);
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Feed ── */
    .feed-item {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      padding: 0.8rem 0;
      border-bottom: 1px solid #1e1e1e;
    }

    .feed-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 0.9rem;
      flex-shrink: 0;
      color: #fff;
      box-shadow: 0 2px 8px rgba(239,68,68,0.25);
    }

    .feed-content { flex: 1; min-width: 0; }

    .feed-name {
      font-weight: 700;
      font-size: 0.9rem;
    }

    .feed-text {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-top: 0.15rem;
    }

    .feed-text .highlight {
      color: var(--gold);
      font-weight: 700;
    }

    .feed-date {
      font-size: 0.7rem;
      color: #555;
      margin-top: 0.2rem;
    }

    .feed-reactions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.4rem;
    }

    .react-btn {
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      border: 1px solid #333;
      background: none;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.2rem;
      color: var(--text-dim);
      font-family: inherit;
    }

    .react-btn:hover { border-color: var(--gold); }
    .react-btn.reacted {
      border-color: var(--gold);
      background: rgba(245, 158, 11, 0.15);
      color: var(--gold);
    }

    .react-count {
      font-size: 0.75rem;
      font-weight: 700;
    }

    /* ── Level Bar ── */
    .level-bar-container {
      margin-top: 0.8rem;
      text-align: center;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 0.6rem 0.8rem;
    }

    .level-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
    }

    .level-name {
      font-size: 0.85rem;
      font-weight: 900;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .level-icon {
      font-size: 1rem;
    }

    .level-xp {
      font-size: 0.7rem;
      color: var(--text-dim);
      font-weight: 600;
    }

    .level-bar {
      height: 10px;
      background: #1e1e1e;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .level-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--gold), #fbbf24);
      border-radius: 6px;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .level-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: rgba(255,255,255,0.15);
      border-radius: 6px 6px 0 0;
    }

    /* ── Badges Row ── */
    .badges-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 0.8rem;
    }

    .badge-pill {
      padding: 0.25rem 0.65rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      animation: badgeIn 0.4s ease backwards;
    }

    .badge-pill:nth-child(1) { animation-delay: 0.1s; }
    .badge-pill:nth-child(2) { animation-delay: 0.2s; }
    .badge-pill:nth-child(3) { animation-delay: 0.3s; }
    .badge-pill:nth-child(4) { animation-delay: 0.4s; }
    .badge-pill:nth-child(5) { animation-delay: 0.5s; }

    @keyframes badgeIn {
      from { opacity: 0; transform: scale(0.7); }
      to { opacity: 1; transform: scale(1); }
    }

    .badge-bronze {
      background: linear-gradient(135deg, rgba(180,83,9,0.2), rgba(146,64,14,0.15));
      border: 1px solid rgba(180,83,9,0.4);
      color: #d97706;
    }

    .badge-silver {
      background: linear-gradient(135deg, rgba(148,163,184,0.2), rgba(100,116,139,0.15));
      border: 1px solid rgba(148,163,184,0.4);
      color: #94a3b8;
    }

    .badge-gold {
      background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(217,119,6,0.15));
      border: 1px solid rgba(245,158,11,0.4);
      color: #f59e0b;
    }

    .badge-diamond {
      background: linear-gradient(135deg, rgba(96,165,250,0.2), rgba(59,130,246,0.15));
      border: 1px solid rgba(96,165,250,0.4);
      color: #60a5fa;
    }

    /* ── Challenge Cards ── */
    .challenge-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 0.8rem;
    }

    .challenge-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.4rem;
    }

    .challenge-title {
      font-weight: 900;
      font-size: 1rem;
    }

    .challenge-badge {
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .type-exercise { background: rgba(59,130,246,0.2); color: var(--blue); }
    .type-attendance { background: rgba(34,197,94,0.2); color: var(--success); }
    .type-custom { background: rgba(168,85,247,0.2); color: var(--purple); }

    .challenge-desc {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
    }

    .challenge-timer {
      font-size: 0.8rem;
      color: var(--accent2);
      margin-bottom: 0.5rem;
    }

    .challenge-lb {
      margin-top: 0.5rem;
    }

    .ch-lb-row {
      display: flex;
      align-items: center;
      padding: 0.3rem 0;
      font-size: 0.85rem;
    }

    .ch-lb-rank {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 0.7rem;
      margin-left: 0.5rem;
      flex-shrink: 0;
    }

    .ch-lb-rank.gold { background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; }
    .ch-lb-rank.silver { background: linear-gradient(135deg, #94a3b8, #64748b); color: #000; }
    .ch-lb-rank.bronze { background: linear-gradient(135deg, #b45309, #92400e); color: #fff; }
    .ch-lb-rank.other { background: #222; color: var(--text-dim); }

    .ch-lb-name { flex: 1; }
    .ch-lb-name.is-me { color: var(--accent); font-weight: 700; }
    .ch-lb-val { font-weight: 900; direction: ltr; }

    /* ── Streak Flame ── */
    .streak-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 0.6rem;
    }

    .streak-flame {
      position: relative;
      width: 28px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .flame-layer {
      position: absolute;
      bottom: 0;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      animation: flicker 0.6s ease-in-out infinite alternate;
    }

    .flame-outer {
      width: 22px;
      height: 30px;
      background: radial-gradient(ellipse at bottom, #ef4444 0%, #dc2626 40%, transparent 70%);
      animation-duration: 0.5s;
    }

    .flame-mid {
      width: 16px;
      height: 24px;
      background: radial-gradient(ellipse at bottom, #f59e0b 0%, #ea580c 50%, transparent 80%);
      animation-duration: 0.4s;
      animation-delay: 0.1s;
    }

    .flame-inner {
      width: 10px;
      height: 16px;
      background: radial-gradient(ellipse at bottom, #fbbf24 0%, #f59e0b 60%, transparent 90%);
      animation-duration: 0.3s;
      animation-delay: 0.05s;
    }

    .flame-spark {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #fbbf24;
      animation: spark 0.8s ease-out infinite;
    }

    .flame-spark:nth-child(4) { left: 30%; animation-delay: 0.2s; }
    .flame-spark:nth-child(5) { left: 60%; animation-delay: 0.5s; }

    @keyframes flicker {
      0% { transform: scaleY(1) scaleX(1) translateY(0); }
      100% { transform: scaleY(1.08) scaleX(0.95) translateY(-1px); }
    }

    @keyframes spark {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-18px) translateX(3px); }
    }

    .streak-text {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--gold);
    }

    .streak-days {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--accent);
    }

    /* scale flame by streak level */
    .streak-level-1 .flame-outer { height: 20px; width: 16px; }
    .streak-level-1 .flame-mid { height: 14px; width: 10px; }
    .streak-level-1 .flame-inner { height: 8px; width: 6px; }
    .streak-level-2 .flame-outer { height: 26px; width: 20px; }
    .streak-level-2 .flame-mid { height: 20px; width: 14px; }
    .streak-level-2 .flame-inner { height: 12px; width: 8px; }
    /* level-3 = default sizes */
    .streak-level-4 .flame-outer { height: 36px; width: 26px; }
    .streak-level-4 .flame-mid { height: 28px; width: 18px; }
    .streak-level-4 .flame-inner { height: 20px; width: 12px; }

    /* ── Badge Shelf (with locked badges) ── */
    .badge-shelf {
      margin-top: 0.6rem;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      padding-bottom: 0.3rem;
    }

    .badge-shelf-inner {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .badge-card {
      min-width: 64px;
      padding: 0.4rem 0.3rem;
      border-radius: 10px;
      text-align: center;
      scroll-snap-align: center;
      transition: transform 0.3s;
      perspective: 800px;
    }

    .badge-card:active {
      transform: rotateY(15deg) rotateX(-5deg);
    }

    .badge-card-earned {
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.25);
    }

    .badge-card-locked {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .badge-icon {
      font-size: 1.4rem;
      margin-bottom: 0.15rem;
    }

    .badge-card-locked .badge-icon {
      filter: brightness(0.3) grayscale(1);
    }

    .badge-card-locked .badge-label {
      color: #444;
    }

    .badge-label {
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--text-dim);
      line-height: 1.2;
      max-width: 70px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge-lock {
      font-size: 0.6rem;
      opacity: 0.4;
    }

    /* ── Heatmap Calendar ── */
    .heatmap-container {
      margin-top: 0.5rem;
    }

    .heatmap-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(7, 1fr);
      gap: 2px;
      direction: ltr;
    }

    .heatmap-cell {
      aspect-ratio: 1;
      border-radius: 2px;
      background: #1a1a1a;
      transition: transform 0.2s;
      min-height: 8px;
    }

    .heatmap-cell:hover {
      transform: scale(1.4);
      z-index: 1;
    }

    .heatmap-cell.h-1 { background: rgba(239,68,68,0.3); }
    .heatmap-cell.h-2 { background: rgba(245,158,11,0.4); }
    .heatmap-cell.h-3 { background: rgba(245,158,11,0.65); }
    .heatmap-cell.h-pr { background: var(--gold); box-shadow: 0 0 4px rgba(245,158,11,0.5); }

    .heatmap-days {
      display: grid;
      grid-template-rows: repeat(7, 1fr);
      gap: 2px;
      font-size: 0.5rem;
      color: #555;
      text-align: left;
      margin-left: 4px;
    }

    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 0.55rem;
      color: #555;
      margin-top: 0.2rem;
      justify-content: flex-end;
      direction: ltr;
    }

    .heatmap-legend-cell {
      width: 8px;
      height: 8px;
      border-radius: 1px;
    }

    /* ── Percentile Bar ── */
    .percentile-container {
      margin-top: 0.5rem;
    }

    .percentile-bar-wrap {
      position: relative;
      height: 18px;
      background: linear-gradient(to right, #1e1e1e, rgba(239,68,68,0.4), rgba(245,158,11,0.6), var(--gold));
      border-radius: 9px;
      overflow: visible;
      margin: 0.3rem 0;
    }

    .percentile-marker {
      position: absolute;
      top: -4px;
      width: 12px;
      height: 26px;
      background: #fff;
      border-radius: 3px;
      transform: translateX(-50%);
      transition: left 1s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 8px rgba(255,255,255,0.4);
    }

    .percentile-marker::after {
      content: attr(data-pct);
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      font-weight: 900;
      color: var(--gold);
      white-space: nowrap;
    }

    .percentile-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: #555;
      direction: ltr;
    }

    .percentile-text {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-align: center;
      margin-top: 0.2rem;
    }

    .percentile-text strong {
      color: var(--gold);
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-dim);
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #333;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-dim);
    }

    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .empty-state .msg { font-size: 0.95rem; }

    /* ── Responsive ── */
    @media (min-width: 600px) {
      .tab-panel { max-width: 500px; margin: 0 auto; }
    }
  </style>
</head>

<script>
// ═══════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════
let API_URL = '';
let myName = '';
let myPRs = [];
let myLifts = [];
let myBenchmarks = [];
let leaderboardData = {};
let leaderboardExercises = [];
let feedData = [];
let myReactedKeys = {};
let myBadges = [];
let activeChallenges = [];
let myGender = '';
let leaderboardGenderFilter = '';

// ═══════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════
(function init() {
  const urlParams = new URLSearchParams(window.location.search);
  API_URL = urlParams.get('api') || localStorage.getItem('wodboard-api') || '';

  // Save API to both localStorage keys for cross-page sync
  if (API_URL) {
    localStorage.setItem('wodboard-api', API_URL);
    // Also sync to index.html settings format
    try {
      var wbSettings = JSON.parse(localStorage.getItem('wodboard') || '{}');
      if (wbSettings.appsScriptUrl !== API_URL) {
        wbSettings.appsScriptUrl = API_URL;
        localStorage.setItem('wodboard', JSON.stringify(wbSettings));
      }
    } catch(e) {}
  }

  // Pass API to linked pages
  if (API_URL) {
    document.getElementById('linkScore').href = 'score.html?api=' + encodeURIComponent(API_URL);
    document.getElementById('linkBoard').href = 'index.html?api=' + encodeURIComponent(API_URL);
    document.getElementById('linkCoach').href = 'coach.html?api=' + encodeURIComponent(API_URL);
  }

  myName = localStorage.getItem('wodboard-athlete-name') || '';
  myGender = localStorage.getItem('wodboard-gender') || '';

  // Load reacted keys from localStorage
  try { myReactedKeys = JSON.parse(localStorage.getItem('wodboard-reacted') || '{}'); } catch(e) {}

  if (!myName) {
    document.getElementById('nameEntry').style.display = 'block';
  } else {
    enterApp();
  }

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
})();

let selectedGender = '';
function selectGender(g) {
  selectedGender = g;
  document.getElementById('genderM').style.borderColor = g === 'M' ? 'var(--accent)' : '#333';
  document.getElementById('genderM').style.background = g === 'M' ? 'rgba(239,68,68,0.15)' : 'none';
  document.getElementById('genderF').style.borderColor = g === 'F' ? 'var(--accent)' : '#333';
  document.getElementById('genderF').style.background = g === 'F' ? 'rgba(239,68,68,0.15)' : 'none';
}

function saveName() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  if (!selectedGender) { alert('בחר/י מגדר'); return; }
  myName = name;
  myGender = selectedGender;
  localStorage.setItem('wodboard-athlete-name', name);
  localStorage.setItem('wodboard-gender', selectedGender);

  // Register on server
  postData({ action: 'registerAthlete', name, gender: selectedGender });

  document.getElementById('nameEntry').style.display = 'none';
  enterApp();
}

function enterApp() {
  document.getElementById('athleteName').textContent = myName;
  document.getElementById('avatarInitial').textContent = myName.charAt(0);
  document.getElementById('welcomeBanner').style.display = 'block';
  document.getElementById('tabsBar').style.display = 'flex';
  document.getElementById('panel-history').style.display = 'block';

  loadMyData();
  loadBadges();
  loadChallenges();
  loadLeaderboard();
  loadFeed();
  loadWOD();
  loadAnnouncements();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => {
    const id = p.id.replace('panel-', '');
    p.classList.toggle('active', id === tab);
    p.style.display = id === tab ? 'block' : 'none';
  });
}

// ═══════════════════════════════════════════════════════
// JSONP helper
// ═══════════════════════════════════════════════════════
function jsonpGet(params) {
  return new Promise((resolve, reject) => {
    if (!API_URL) { reject('No API URL'); return; }
    const cbName = 'cb_' + Math.random().toString(36).slice(2);
    const url = API_URL + '?' + new URLSearchParams({ ...params, callback: cbName }).toString();
    window[cbName] = (data) => {
      resolve(data);
      delete window[cbName];
      script.remove();
    };
    const script = document.createElement('script');
    script.src = url;
    script.onerror = () => { reject('Network error'); delete window[cbName]; script.remove(); };
    document.body.appendChild(script);
    setTimeout(() => { if (window[cbName]) { reject('Timeout'); delete window[cbName]; script.remove(); } }, 15000);
  });
}

function postData(payload) {
  return new Promise((resolve, reject) => {
    if (!API_URL) { reject('No API URL'); return; }
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = API_URL;
    form.target = 'postFrame';
    form.style.display = 'none';

    const input = document.createElement('input');
    input.name = 'payload';
    input.value = JSON.stringify(payload);
    form.appendChild(input);

    let iframe = document.getElementById('postFrame');
    if (!iframe) {
      iframe = document.createElement('iframe');
      iframe.name = 'postFrame';
      iframe.id = 'postFrame';
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
    }

    document.body.appendChild(form);
    form.submit();
    form.remove();

    // Can't read iframe response cross-origin, assume success
    setTimeout(() => resolve({ status: 'ok' }), 1500);
  });
}

// ═══════════════════════════════════════════════════════
// Load My Data
// ═══════════════════════════════════════════════════════
async function loadMyData() {
  try {
    const [prsRes, liftsRes, benchRes] = await Promise.all([
      jsonpGet({ action: 'myprs', name: myName }),
      jsonpGet({ action: 'mylifts', name: myName }),
      jsonpGet({ action: 'mybenchmarks', name: myName })
    ]);

    myPRs = prsRes.prs || [];
    myLifts = liftsRes.lifts || [];
    myBenchmarks = benchRes.benchmarks || [];

    // Update stats
    document.getElementById('statPRs').textContent = myPRs.length;
    document.getElementById('statLifts').textContent = myLifts.length;

    // Calculate athlete level
    updateLevel(myPRs.length, myLifts.length);

    // Streak flame
    var streak = calculateStreak(myLifts, myBenchmarks);
    renderStreak(streak);

    // Heatmap
    renderHeatmap(myLifts, myBenchmarks);

    renderHistory();
  } catch (err) {
    document.getElementById('historyContent').innerHTML =
      '<div class="empty-state"><div class="icon">⚠️</div><div class="msg">לא הצלחתי להתחבר לשרת</div></div>';
  }
}

// ═══════════════════════════════════════════════════════
// Render History
// ═══════════════════════════════════════════════════════
function renderHistory() {
  const container = document.getElementById('historyContent');

  if (myPRs.length === 0 && myLifts.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🏋️</div><div class="msg">עדיין אין נתונים. הזן תוצאות דרך עמוד "הזנת תוצאה"</div></div>';
    return;
  }

  let html = '';

  // PRs Section
  if (myPRs.length > 0) {
    const liftPRs = myPRs.filter(p => p.type === 'lift');
    const benchPRs = myPRs.filter(p => p.type === 'benchmark');

    if (liftPRs.length > 0) {
      html += '<div class="card"><div class="card-title">🏆 שיאים אישיים — הרמות</div>';
      liftPRs.forEach(pr => {
        html += `<div class="pr-item">
          <div><div class="pr-exercise">${esc(pr.exercise)}</div><div class="pr-date">${esc(pr.date)}</div></div>
          <div class="pr-value">${esc(pr.best)}</div>
        </div>`;
      });
      html += '</div>';
    }

    if (benchPRs.length > 0) {
      html += '<div class="card"><div class="card-title">🏆 שיאים אישיים — בנצ\'מרקים</div>';
      benchPRs.forEach(pr => {
        html += `<div class="pr-item">
          <div><div class="pr-exercise">${esc(pr.exercise)}</div><div class="pr-date">${esc(pr.date)}</div></div>
          <div class="pr-value">${esc(pr.best)}</div>
        </div>`;
      });
      html += '</div>';
    }
  }

  // Progress Charts — group lifts by exercise, show last 8 entries
  const exerciseGroups = {};
  myLifts.forEach(l => {
    if (!exerciseGroups[l.exercise]) exerciseGroups[l.exercise] = [];
    exerciseGroups[l.exercise].push(l);
  });

  Object.keys(exerciseGroups).forEach(exercise => {
    const entries = exerciseGroups[exercise].slice(-8);
    if (entries.length < 2) return; // Need at least 2 for a chart

    const maxVal = Math.max(...entries.map(e => e.est1RM));

    html += `<div class="card"><div class="card-title">📈 התקדמות — ${esc(exercise)}</div><div class="chart-container">`;
    entries.forEach(entry => {
      const pct = maxVal > 0 ? Math.round((entry.est1RM / maxVal) * 100) : 0;
      const barClass = entry.isPR ? 'pr-bar' : 'normal-bar';
      const dateLabel = entry.date ? entry.date.slice(5) : '';
      html += `<div class="chart-bar-row">
        <div class="chart-label">${dateLabel}</div>
        <div class="chart-bar-wrap">
          <div class="chart-bar ${barClass}" style="width:${pct}%">${entry.weight}${entry.unit}×${entry.reps}</div>
        </div>
      </div>`;
    });
    html += '</div></div>';
  });

  // Benchmark history
  const benchGroups = {};
  myBenchmarks.forEach(b => {
    if (!benchGroups[b.wod]) benchGroups[b.wod] = [];
    benchGroups[b.wod].push(b);
  });

  Object.keys(benchGroups).forEach(wod => {
    const entries = benchGroups[wod].slice(-8);
    if (entries.length < 1) return;

    html += `<div class="card"><div class="card-title">📋 ${esc(wod)}</div>`;
    entries.forEach(entry => {
      html += `<div class="pr-item">
        <div><div class="pr-date">${esc(entry.date)}</div></div>
        <div class="pr-value" style="color:${entry.isPR ? 'var(--gold)' : 'var(--text)'}">${esc(entry.score)} ${entry.isPR ? '🏆' : ''}</div>
      </div>`;
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════
// Load Leaderboard
// ═══════════════════════════════════════════════════════
async function loadLeaderboard() {
  try {
    const params = { action: 'leaderboard' };
    if (leaderboardGenderFilter) params.gender = leaderboardGenderFilter;
    const res = await jsonpGet(params);
    leaderboardData = res.leaderboard || {};
    leaderboardExercises = res.exercises || [];

    renderLeaderboardFilter();
    if (leaderboardExercises.length > 0) {
      renderLeaderboard(leaderboardExercises[0]);
    } else {
      document.getElementById('leaderboardContent').innerHTML =
        '<div class="empty-state"><div class="icon">🏆</div><div class="msg">עדיין אין נתונים בלידרבורד</div></div>';
    }
    // Render percentile bar
    renderPercentile();
  } catch (err) {
    document.getElementById('leaderboardContent').innerHTML =
      '<div class="empty-state"><div class="icon">⚠️</div><div class="msg">שגיאה בטעינת לידרבורד</div></div>';

        <div class="feed-date">${daysAgo}</div>

            💪 ${item.reactions > 0 ? '<span class="react-count">' + item.reactions + '</span>' : ''}
          </button>` : ''}
          ${isMe && item.reactions > 0 ? `<span class="react-btn reacted" style="cursor:default;">💪 <span class="react-count">${item.reactions}</span></span>` : ''}
          ${item.reactions > 0 ? `<span style="font-size:0.7rem;color:var(--text-dim)">${item.reactionFromNames.slice(0, 3).join(', ')}${item.reactionFromNames.length > 3 ? ' +' + (item.reactionFromNames.length - 3) : ''}</span>` : ''}
        </div>
      </div>
    </div>`;
  });

  container.innerHTML = html;

function getDaysAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - d) / (1000 * 60 * 60 * 24));
  if (diff === 0) return 'היום';
  if (diff === 1) return 'אתמול';
  if (diff < 7) return 'לפני ' + diff + ' ימים';
  if (diff < 30) return 'לפני ' + Math.floor(diff / 7) + ' שבועות';
  return dateStr;
}

// ═══════════════════════════════════════════════════════
// React to a PR
// ═══════════════════════════════════════════════════════
async function react(toName, exercise, date, btn) {
  if (!myName) return;
  const reactKey = toName + '|' + exercise + '|' + date;
  if (myReactedKeys[reactKey]) return;

  btn.classList.add('reacted');
  btn.disabled = true;

  // Update count visually
  let countEl = btn.querySelector('.react-count');
  if (!countEl) {
    countEl = document.createElement('span');
    countEl.className = 'react-count';
    countEl.textContent = '1';
    btn.appendChild(countEl);
  } else {
    countEl.textContent = (parseInt(countEl.textContent) || 0) + 1;
  }

  // Save locally
  myReactedKeys[reactKey] = true;
  localStorage.setItem('wodboard-reacted', JSON.stringify(myReactedKeys));

  // Send to server
  try {
    await postData({
      action: 'reaction',
      fromName: myName,
      toName: toName,
      exercise: exercise,
      type: 'lift',
      emoji: '💪',
      date: date
    });
  } catch (err) {
    // Already saved locally, will show as reacted
  }
}

// ═══════════════════════════════════════════════════════
// Athlete Level System
// ═══════════════════════════════════════════════════════
function updateLevel(prs, lifts) {
  const xp = prs * 10 + lifts * 2; // PRs worth more
  const levels = [
    { name: 'מתחיל', icon: '🌱', min: 0 },
    { name: 'ספורטאי', icon: '💪', min: 20 },
    { name: 'מתקדם', icon: '⚡', min: 60 },
    { name: 'חזק', icon: '🦾', min: 120 },
    { name: 'מכונה', icon: '⚙️', min: 200 },
    { name: 'חיה', icon: '🐺', min: 350 },
    { name: 'אלוף', icon: '👑', min: 500 },
    { name: 'אגדה', icon: '🔥', min: 800 }
  ];

  let currentLevel = levels[0];
  let nextLevel = levels[1];
  for (let i = 0; i < levels.length; i++) {
    if (xp >= levels[i].min) {
      currentLevel = levels[i];
      nextLevel = levels[i + 1] || null;
    }
  }

  const el = document.getElementById('levelBar');
  el.style.display = 'block';
  document.getElementById('levelName').textContent = currentLevel.name;
  document.getElementById('levelIcon').textContent = currentLevel.icon;
  document.getElementById('athleteTitle').textContent = currentLevel.icon + ' ' + currentLevel.name;

  if (nextLevel) {
    const progress = ((xp - currentLevel.min) / (nextLevel.min - currentLevel.min)) * 100;
    document.getElementById('levelFill').style.width = Math.min(100, progress) + '%';
    document.getElementById('levelXP').textContent = xp + ' / ' + nextLevel.min + ' XP';
  } else {
    document.getElementById('levelFill').style.width = '100%';
    document.getElementById('levelXP').textContent = xp + ' XP — MAX!';
  }
}

// ═══════════════════════════════════════════════════════
// Utils
// ═══════════════════════════════════════════════════════
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escAttr(s) {
  return esc(s).replace(/'/g, '&#39;');
}

// ═══════════════════════════════════════════════════════
// Feature 1: Streak Flame
// ═══════════════════════════════════════════════════════
function calculateStreak(lifts, benchmarks) {
  // Collect all unique workout dates
  var dates = {};
  lifts.forEach(function(l) { if (l.date) dates[l.date] = true; });
  benchmarks.forEach(function(b) { if (b.date) dates[b.date] = true; });

  var sortedDates = Object.keys(dates).sort().reverse();
  if (sortedDates.length === 0) return 0;

  // Count consecutive weeks with at least one workout (more realistic than daily)
  var streak = 0;
  var now = new Date();
  var currentWeekStart = getWeekStart(now);

  for (var w = 0; w < 52; w++) {
    var weekStart = new Date(currentWeekStart);
    weekStart.setDate(weekStart.getDate() - (w * 7));
    var weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 6);

    var hasWorkout = sortedDates.some(function(d) {
      var dt = new Date(d);
      return dt >= weekStart && dt <= weekEnd;
    });

    if (hasWorkout) {
      streak++;
    } else if (w > 0) {
      break; // streak broken
    }
  }
  return streak;
}

function getWeekStart(d) {
  var date = new Date(d);
  var day = date.getDay();
  date.setDate(date.getDate() - day);
  date.setHours(0, 0, 0, 0);
  return date;
}

function renderStreak(weekStreak) {
  if (weekStreak < 1) return;

  var container = document.getElementById('streakContainer');
  container.style.display = 'flex';
  document.getElementById('streakDays').textContent = weekStreak;
  document.querySelector('.streak-text').textContent = weekStreak === 1 ? 'שבוע רצף' : 'שבועות רצף';

  // Scale flame based on streak
  var flame = document.getElementById('streakFlame');
  var level = weekStreak <= 2 ? 1 : weekStreak <= 4 ? 2 : weekStreak <= 8 ? 3 : 4;
  flame.parentElement.className = 'streak-container streak-level-' + level;
  flame.parentElement.style.display = 'flex';
}

// ═══════════════════════════════════════════════════════
// Feature 3: Heatmap Calendar
// ═══════════════════════════════════════════════════════
function renderHeatmap(lifts, benchmarks) {
  // Build date → intensity map for last 12 weeks
  var now = new Date();
  var start = new Date(now);
  start.setDate(start.getDate() - 83); // 12 weeks = 84 days
  start = getWeekStart(start);

  var dateMap = {}; // date string → { count, hasPR }

  lifts.forEach(function(l) {
    if (!l.date) return;
    if (!dateMap[l.date]) dateMap[l.date] = { count: 0, hasPR: false };
    dateMap[l.date].count++;
    if (l.isPR) dateMap[l.date].hasPR = true;
  });

  benchmarks.forEach(function(b) {
    if (!b.date) return;
    if (!dateMap[b.date]) dateMap[b.date] = { count: 0, hasPR: false };
    dateMap[b.date].count++;
    if (b.isPR) dateMap[b.date].hasPR = true;
  });

  // Check if we have any data in the last 12 weeks
  var hasData = false;
  for (var key in dateMap) {
    var d = new Date(key);
    if (d >= start) { hasData = true; break; }
  }

  if (!hasData && lifts.length === 0) return;

  var card = document.getElementById('heatmapCard');
  card.style.display = 'block';

  // Day labels (Hebrew, Sunday first)
  var dayNames = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];
  var daysEl = document.getElementById('heatmapDays');
  daysEl.innerHTML = dayNames.map(function(d) { return '<div>' + d + '</div>'; }).join('');

  // Build grid: 12 columns (weeks) x 7 rows (days)
  var grid = document.getElementById('heatmapGrid');
  var cells = '';

  for (var week = 0; week < 12; week++) {
    for (var day = 0; day < 7; day++) {
      var cellDate = new Date(start);
      cellDate.setDate(cellDate.getDate() + (week * 7) + day);

      var dateStr = cellDate.toISOString().slice(0, 10);
      var info = dateMap[dateStr];
      var cls = 'heatmap-cell';
      var tooltip = dayNames[day] + ' ' + dateStr.slice(5);

      if (cellDate > now) {
        cls += ''; // future = empty
      } else if (info) {
        if (info.hasPR) {
          cls += ' h-pr';
          tooltip += ' ⭐ PR!';
        } else if (info.count >= 3) {
          cls += ' h-3';
        } else if (info.count >= 2) {
          cls += ' h-2';
        } else {
          cls += ' h-1';
        }
        tooltip += ' (' + info.count + ' רישומים)';
      }

      cells += '<div class="' + cls + '" title="' + tooltip + '"></div>';
    }
  }

  grid.innerHTML = cells;
}

  var shown = 0;

  // Show percentile for top 3 exercises where the user has a score
  leaderboardExercises.forEach(function(ex) {
    if (shown >= 3) return;
    var entries = leaderboardData[ex] || [];
    if (entries.length < 3) return; // need enough people

    var myIdx = -1;
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].name === myName) { myIdx = i; break; }
    }
    if (myIdx === -1) return;

    var percentile = Math.round(((entries.length - myIdx) / entries.length) * 100);
    var pctLeft = Math.max(5, Math.min(95, percentile));

    html += '<div style="margin-bottom:0.8rem;">' +
      '<div style="font-size:0.8rem;font-weight:700;margin-bottom:0.15rem;">' + esc(ex) + '</div>' +
      '<div class="percentile-bar-wrap">' +
      '<div class="percentile-marker" style="left:' + pctLeft + '%" data-pct="Top ' + percentile + '%"></div>' +
      '</div>' +
      '<div class="percentile-labels"><span>Bottom</span><span>Top</span></div>' +
      '</div>';

    shown++;
  });

  if (shown > 0) {
    card.style.display = 'block';
    content.innerHTML = html;
  }
}

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
