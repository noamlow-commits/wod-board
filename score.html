<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Log Score - CrossFit Gush Etzion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --card-bg: #141414;
      --card-border: #2a2a2a;
      --text: #f0f0f0;
      --text-dim: #888;
      --accent: #ef4444;
      --accent2: #f59e0b;
      --success: #22c55e;
    }

    body {
      font-family: 'Heebo', 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      text-align: center;
      padding: 1rem 0 1.5rem;
      width: 100%;
      max-width: 420px;
    }

    .header .logo {
      font-family: 'Barlow', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.3rem;
    }

    .header .subtitle {
      color: var(--text-dim);
      font-size: 0.95rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 420px;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
      font-weight: 700;
    }

    .form-group input[type="text"],
    .form-group input[type="number"] {
      width: 100%;
      padding: 0.8rem 1rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 1.1rem;
      direction: auto;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Score type selector */
    .type-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }

    .type-btn {
      padding: 0.7rem;
      border: 2px solid #333;
      border-radius: 10px;
      background: transparent;
      color: var(--text-dim);
      font-family: 'Heebo', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .type-btn:hover {
      border-color: #555;
      color: var(--text);
    }

    .type-btn.active {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(239, 68, 68, 0.1);
    }

    .type-btn .type-icon {
      display: block;
      font-size: 1.3rem;
      margin-bottom: 0.2rem;
    }

    /* Score input areas */
    .score-input-area {
      display: none;
    }

    .score-input-area.active {
      display: block;
    }

    .time-inputs, .amrap-inputs {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      direction: ltr;
    }

    .time-inputs input, .amrap-inputs input {
      flex: 1;
      text-align: center;
      font-size: 2rem;
      font-weight: 900;
      font-family: 'Barlow', sans-serif;
      padding: 0.8rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: var(--text);
    }

    .time-inputs input:focus, .amrap-inputs input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .time-inputs .separator, .amrap-inputs .separator {
      font-size: 2rem;
      font-weight: 900;
      color: var(--text-dim);
    }

    .input-label {
      display: block;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 0.3rem;
    }

    .single-score input {
      width: 100%;
      text-align: center;
      font-size: 2.5rem;
      font-weight: 900;
      font-family: 'Barlow', sans-serif;
      padding: 0.8rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: var(--text);
      direction: ltr;
    }

    .single-score input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .weight-unit {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .weight-unit button {
      padding: 0.4rem 1.2rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: transparent;
      color: var(--text-dim);
      font-family: 'Barlow', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }

    .weight-unit button.active {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(245, 158, 11, 0.1);
    }

    /* Rx selector */
    .rx-selector {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }

    .rx-btn {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: transparent;
      color: var(--text-dim);
      font-family: 'Barlow', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }

    .rx-btn.active {
      border-color: var(--success);
      color: var(--success);
      background: rgba(34, 197, 94, 0.1);
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Heebo', sans-serif;
      font-size: 1.2rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
    }

    .submit-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 1rem 2rem;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      transition: transform 0.3s ease-out;
      z-index: 100;
      text-align: center;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      background: rgba(34, 197, 94, 0.95);
      color: #fff;
    }

    .toast.error {
      background: rgba(239, 68, 68, 0.95);
      color: #fff;
    }

    /* View scoreboard link */
    .view-board {
      text-align: center;
      margin-top: 0.5rem;
    }

    .view-board a {
      color: var(--text-dim);
      font-size: 0.85rem;
      text-decoration: none;
    }

    .view-board a:hover {
      color: var(--text);
    }

    /* History */
    .history {
      width: 100%;
      max-width: 420px;
    }

    .history h3 {
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
    }

    .history-item {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      margin-bottom: 0.4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      direction: ltr;
    }

    .history-item .h-score {
      font-family: 'Barlow', sans-serif;
      font-weight: 900;
      font-size: 1.1rem;
    }

    .history-item .h-time {
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    .history-item .h-rx {
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
      font-weight: 700;
    }

    .history-item .h-rx.rx { background: rgba(34, 197, 94, 0.15); color: var(--success); }
    .history-item .h-rx.scaled { background: rgba(245, 158, 11, 0.15); color: var(--accent2); }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">CrossFit Gush Etzion</div>
    <div class="subtitle">רישום תוצאות</div>
  </div>

  <div class="card">
    <!-- Name -->
    <div class="form-group">
      <label>שם</label>
      <input type="text" id="athleteName" placeholder="הכנס את שמך" autocomplete="name">
    </div>

    <!-- Score Type -->
    <label style="font-size:0.9rem;color:var(--text-dim);font-weight:700;margin-bottom:0.4rem;display:block;">סוג תוצאה</label>
    <div class="type-selector">
      <button class="type-btn active" data-type="time" onclick="selectType('time')">
        <span class="type-icon">⏱</span>
        For Time
      </button>
      <button class="type-btn" data-type="amrap" onclick="selectType('amrap')">
        <span class="type-icon">🔄</span>
        AMRAP
      </button>
      <button class="type-btn" data-type="reps" onclick="selectType('reps')">
        <span class="type-icon">💪</span>
        Reps
      </button>
      <button class="type-btn" data-type="weight" onclick="selectType('weight')">
        <span class="type-icon">🏋️</span>
        Weight
      </button>
    </div>

    <!-- Time input -->
    <div class="score-input-area active" id="input-time">
      <div class="time-inputs">
        <div style="flex:1;">
          <input type="number" id="timeMin" min="0" max="99" placeholder="00" inputmode="numeric">
          <span class="input-label">min</span>
        </div>
        <span class="separator">:</span>
        <div style="flex:1;">
          <input type="number" id="timeSec" min="0" max="59" placeholder="00" inputmode="numeric">
          <span class="input-label">sec</span>
        </div>
      </div>
    </div>

    <!-- AMRAP input -->
    <div class="score-input-area" id="input-amrap">
      <div class="amrap-inputs">
        <div style="flex:1;">
          <input type="number" id="amrapRounds" min="0" max="999" placeholder="0" inputmode="numeric">
          <span class="input-label">rounds</span>
        </div>
        <span class="separator">+</span>
        <div style="flex:1;">
          <input type="number" id="amrapReps" min="0" max="999" placeholder="0" inputmode="numeric">
          <span class="input-label">reps</span>
        </div>
      </div>
    </div>

    <!-- Reps input -->
    <div class="score-input-area" id="input-reps">
      <div class="single-score">
        <input type="number" id="repsTotal" min="0" max="9999" placeholder="0" inputmode="numeric">
        <span class="input-label">total reps</span>
      </div>
    </div>

    <!-- Weight input -->
    <div class="score-input-area" id="input-weight">
      <div class="single-score">
        <input type="number" id="weightVal" min="0" max="999" step="0.5" placeholder="0" inputmode="decimal">
        <div class="weight-unit">
          <button class="active" onclick="selectUnit(this, 'kg')">KG</button>
          <button onclick="selectUnit(this, 'lbs')">LBS</button>
        </div>
      </div>
    </div>

    <!-- Rx / Scaled -->
    <div class="rx-selector">
      <button class="rx-btn active" onclick="selectRx(this, 'Rx')">Rx</button>
      <button class="rx-btn" onclick="selectRx(this, 'Scaled')">Scaled</button>
    </div>

    <!-- Submit -->
    <button class="submit-btn" id="submitBtn" onclick="submitScore()">שלח תוצאה</button>
  </div>

  <!-- Today's submissions from this device -->
  <div class="history" id="historySection" style="display:none;">
    <h3>השליחות שלך היום</h3>
    <div id="historyList"></div>
  </div>

  <div class="view-board">
    <a href="index.html" target="_blank">צפה בלוח התוצאות &larr;</a>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ═══════════════════════════════
    // State
    // ═══════════════════════════════
    let selectedType = 'time';
    let selectedRx = 'Rx';
    let selectedUnit = 'kg';

    // Read API URL from URL parameter or localStorage
    const urlParams = new URLSearchParams(window.location.search);
    const API_URL = urlParams.get('api') || localStorage.getItem('wodboard-api') || '';

    // ═══════════════════════════════
    // Init
    // ═══════════════════════════════
    (function init() {
      // Restore saved name
      const savedName = localStorage.getItem('wodboard-athlete-name');
      if (savedName) document.getElementById('athleteName').value = savedName;

      // Restore last used type
      const savedType = localStorage.getItem('wodboard-score-type');
      if (savedType) selectType(savedType);

      // Save API URL to localStorage for future use
      if (urlParams.get('api')) {
        localStorage.setItem('wodboard-api', urlParams.get('api'));
      }

      renderHistory();
    })();

    // ═══════════════════════════════
    // Type selection
    // ═══════════════════════════════
    function selectType(type) {
      selectedType = type;
      localStorage.setItem('wodboard-score-type', type);

      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.type-btn[data-type="${type}"]`).classList.add('active');

      document.querySelectorAll('.score-input-area').forEach(a => a.classList.remove('active'));
      document.getElementById(`input-${type}`).classList.add('active');
    }

    function selectRx(btn, val) {
      selectedRx = val;
      document.querySelectorAll('.rx-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function selectUnit(btn, unit) {
      selectedUnit = unit;
      document.querySelectorAll('.weight-unit button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    // ═══════════════════════════════
    // Build score data
    // ═══════════════════════════════
    function getScoreData() {
      let score = '';
      let rawValue = 0;

      switch (selectedType) {
        case 'time': {
          const min = parseInt(document.getElementById('timeMin').value) || 0;
          const sec = parseInt(document.getElementById('timeSec').value) || 0;
          if (min === 0 && sec === 0) return null;
          score = `${min}:${String(sec).padStart(2, '0')}`;
          rawValue = min * 60 + sec;
          break;
        }
        case 'amrap': {
          const rounds = parseInt(document.getElementById('amrapRounds').value) || 0;
          const reps = parseInt(document.getElementById('amrapReps').value) || 0;
          if (rounds === 0 && reps === 0) return null;
          score = `${rounds}+${reps}`;
          rawValue = rounds * 1000 + reps;
          break;
        }
        case 'reps': {
          const total = parseInt(document.getElementById('repsTotal').value) || 0;
          if (total === 0) return null;
          score = String(total);
          rawValue = total;
          break;
        }
        case 'weight': {
          const wt = parseFloat(document.getElementById('weightVal').value) || 0;
          if (wt === 0) return null;
          score = `${wt} ${selectedUnit}`;
          rawValue = selectedUnit === 'lbs' ? wt * 0.453592 : wt; // normalize to kg
          break;
        }
      }

      return { score, rawValue, scoreType: selectedType };
    }

    // ═══════════════════════════════
    // Submit
    // ═══════════════════════════════
    async function submitScore() {
      const name = document.getElementById('athleteName').value.trim();
      if (!name) {
        showToast('הכנס את שמך', 'error');
        document.getElementById('athleteName').focus();
        return;
      }

      const scoreData = getScoreData();
      if (!scoreData) {
        showToast('הכנס תוצאה', 'error');
        return;
      }

      if (!API_URL) {
        showToast('API URL missing — scan QR from the board', 'error');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'שולח...';

      // Save name for next time
      localStorage.setItem('wodboard-athlete-name', name);

      const today = new Date().toISOString().slice(0, 10);

      const payload = {
        name,
        score: scoreData.score,
        scoreType: scoreData.scoreType,
        rawValue: scoreData.rawValue,
        rx: selectedRx,
        workoutDate: today
      };

      try {
        await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload),
          mode: 'no-cors'
        });

        // no-cors means we can't read response, but it usually works
        showToast('התוצאה נשלחה!', 'success');
        saveToHistory(payload);
        renderHistory();

      } catch (err) {
        console.error('Submit error:', err);
        showToast('שגיאה בשליחה, נסה שוב', 'error');
      }

      btn.disabled = false;
      btn.textContent = 'שלח תוצאה';
    }

    // ═══════════════════════════════
    // Local history
    // ═══════════════════════════════
    function saveToHistory(entry) {
      const key = 'wodboard-history';
      let history = [];
      try { history = JSON.parse(localStorage.getItem(key) || '[]'); } catch {}
      entry.timestamp = new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
      history.unshift(entry);
      // Keep only today's entries, max 20
      const today = new Date().toISOString().slice(0, 10);
      history = history.filter(h => h.workoutDate === today).slice(0, 20);
      localStorage.setItem(key, JSON.stringify(history));
    }

    function renderHistory() {
      const key = 'wodboard-history';
      let history = [];
      try { history = JSON.parse(localStorage.getItem(key) || '[]'); } catch {}
      const today = new Date().toISOString().slice(0, 10);
      history = history.filter(h => h.workoutDate === today);

      const section = document.getElementById('historySection');
      const list = document.getElementById('historyList');

      if (history.length === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      list.innerHTML = history.map(h => `
        <div class="history-item">
          <span class="h-score">${h.score}</span>
          <span class="h-rx ${h.rx === 'Rx' ? 'rx' : 'scaled'}">${h.rx}</span>
          <span class="h-time">${h.timestamp}</span>
        </div>
      `).join('');
    }

    // ═══════════════════════════════
    // Toast
    // ═══════════════════════════════
    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
